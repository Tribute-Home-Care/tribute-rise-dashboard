<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tribute — Caregiver Intelligence Suite</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='13' fill='%23FF671F'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#fff;--bg2:#F4F6F9;--text:#0F1E35;--text2:#5B6B80;--text3:#8E9AAB;--border:rgba(15,30,53,0.09);--border2:rgba(15,30,53,0.18);--orange:#FF671F;--orange-dark:#E25309;--red-text:#791F1F;--r:8px}
@media(prefers-color-scheme:dark){:root{--bg:#101826;--bg2:#18222F;--text:#E8ECF2;--text2:#9AA7B8;--text3:#6B7889;--border:rgba(255,255,255,0.09);--border2:rgba(255,255,255,0.16);--red-text:#F09595}}
html,body{height:100%}
body{font-family:'Source Sans 3',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:14px;display:flex;flex-direction:column}
body::before{content:"";position:fixed;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#FF671F 70%,#FDDA24);z-index:300}

/* GATE */
.gate{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:200}
.gate-box{width:380px;max-width:90vw;text-align:center}
.logo{display:flex;align-items:baseline;gap:7px;justify-content:center}
.wordmark{color:var(--orange);font-size:20px;font-weight:700;letter-spacing:-.01em;line-height:1}
.wordmark-sub{font-size:10px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--text3)}
.gate-box .gt{font-size:21px;font-weight:600;margin-top:18px}
.gate-box .gs{font-size:13px;color:var(--text3);margin-top:6px;line-height:1.5}
.gate-box input{width:100%;padding:11px 13px;font-size:14px;border:.5px solid var(--border2);border-radius:var(--r);background:var(--bg2);color:var(--text);margin:18px 0 10px}
.gate-box button{width:100%;padding:11px;font-size:13px;font-weight:600;border:none;border-radius:var(--r);background:var(--orange);color:#fff;cursor:pointer}
.gate-box button:hover{background:var(--orange-dark)}
.gate-err{color:var(--red-text);font-size:12px;margin-top:10px;min-height:16px}

/* SUITE HEADER */
.suite-hdr{display:flex;align-items:center;gap:24px;padding:10px 20px 0;border-bottom:.5px solid var(--border);background:var(--bg);flex-wrap:wrap}
.suite-hdr .logo{padding-bottom:10px}
.suite-tabs{display:flex;gap:2px;margin-left:8px}
.stab{font-size:14px;font-weight:600;color:var(--text2);padding:10px 20px;cursor:pointer;border-bottom:2.5px solid transparent;margin-bottom:-.5px;user-select:none;white-space:nowrap}
.stab.on{color:var(--text);border-bottom-color:var(--orange)}
.stab:hover:not(.on){color:var(--text)}

/* FRAMES */
.frames{flex:1;position:relative;min-height:0}
.frames iframe{position:absolute;inset:0;width:100%;height:100%;border:none;display:none;background:var(--bg)}
.frames iframe.on{display:block}
.frame-loading{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:13px;pointer-events:none}
</style>
</head>
<body>

<!-- GATE -->
<div class="gate" id="gate">
  <div class="gate-box">
    <div class="logo"><span class="wordmark">Tribute</span><span class="wordmark-sub">Home Care</span></div>
    <div class="gt">Welcome to the Caregiver Intelligence Suite</div>
    <div class="gs">The Rise Dashboard and Caregiver Retention Tracker, in one place.<br>Enter the shared team password to continue.</div>
    <input type="password" id="gateInput" placeholder="Team password" autocomplete="current-password" onkeydown="if(event.key==='Enter')submitGate()">
    <button onclick="submitGate()">Enter</button>
    <div class="gate-err" id="gateErr"></div>
  </div>
</div>

<!-- SUITE -->
<div class="suite-hdr" style="display:none" id="suiteHdr">
  <div class="logo"><span class="wordmark">Tribute</span><span class="wordmark-sub">Caregiver Intelligence Suite</span></div>
  <div class="suite-tabs">
    <div class="stab on" id="stab-rise" onclick="showApp('rise')">Rise Dashboard</div>
    <div class="stab" id="stab-retention" onclick="showApp('retention')">Retention Tracker</div>
  </div>
</div>
<div class="frames" id="frames" style="display:none">
  <iframe id="frame-rise" class="on" title="Rise Dashboard"></iframe>
  <iframe id="frame-retention" title="Caregiver Retention Tracker"></iframe>
</div>

<script>
const PROXY='https://tribute-api-prod-bkc4hfcwf3f2f6bf.centralus-01.azurewebsites.net/api/vivProxy';
const KEY_LS='tribute_suite_key';
const APPS={
  rise:'rise.html',
  retention:'https://andrewdobsonn-cell.github.io/Tribute-Operating-System/retention_tracker.html'
};
const loaded={rise:false,retention:false};

function getKey(){ try{return localStorage.getItem(KEY_LS)||'';}catch(e){return '';} }

async function submitGate(){
  const v=document.getElementById('gateInput').value.trim();
  const err=document.getElementById('gateErr');
  if(!v){ err.textContent='Enter the team password.'; return; }
  err.textContent='Checking…';
  try{
    const r=await fetch(PROXY+'?endpoint=rise_uploads',{headers:{'X-Retention-Key':v}});
    if(r.status===401){ err.textContent='Incorrect password.'; return; }
    if(!r.ok)throw new Error('HTTP '+r.status);
  }catch(e){ err.textContent='Could not verify right now ('+e.message+') — try again.'; return; }
  try{localStorage.setItem(KEY_LS,v);}catch(e){}
  enter(v);
}

function enter(key){
  document.getElementById('gate').style.display='none';
  document.getElementById('suiteHdr').style.display='';
  document.getElementById('frames').style.display='';
  showApp('rise',key);
}

// Lazy-load each app on first open, handing the key off via the URL hash —
// the apps store it themselves and strip it from their address bar.
function showApp(which,key){
  key=key||getKey();
  document.querySelectorAll('.stab').forEach(t=>t.classList.remove('on'));
  document.getElementById('stab-'+which).classList.add('on');
  document.querySelectorAll('.frames iframe').forEach(f=>f.classList.remove('on'));
  const f=document.getElementById('frame-'+which);
  f.classList.add('on');
  if(!loaded[which]){
    f.src=APPS[which]+'#k='+encodeURIComponent(key);
    loaded[which]=true;
  }
}

// Boot: stored key skips the gate (it was validated when first saved)
if(getKey())enter(getKey());
</script>
</body>
</html>
